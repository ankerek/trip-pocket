name = "extract-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Per-IP rate limit: 100 req / 60s. Cheap insurance until v1.0 auth lands.
# A leaked URL costs only a few dollars to abuse before this cuts in.
[[unsafe.bindings]]
name = "RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# GEMINI_API_KEY is set via:
#   wrangler secret put GEMINI_API_KEY
# It is NOT committed and NOT in this file.

# Logs include status, latency, and error class only — never OCR text.
[observability]
enabled = true
