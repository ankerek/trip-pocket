name = "trip-pocket-extract-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Per-IP rate limit: 100 req / 60s. Cheap insurance until v1.0 auth lands.
# A leaked URL costs only a few dollars to abuse before this cuts in.
[[unsafe.bindings]]
name = "RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# Cloudflare AI Gateway routing. Account ID is not a secret; the gateway
# name is the auto-created "default" gateway in the dashboard.
[vars]
CF_ACCOUNT_ID = "cbe6c750b30fa9390489224a1e0aa3e0"
AI_GATEWAY_NAME = "default"
# Apify actor for the IG carousel / og-failure path. `apify~` form is Apify's
# URL-safe stand-in for the `apify/` namespace separator. Pluggable so we can
# swap actors via env if the default ever misbehaves or cost shifts.
APIFY_ACTOR_ID = "apify~instagram-post-scraper"

# Secrets (set via `wrangler secret put`, never committed):
#   GEMINI_API_KEY         — Google AI Studio API key (Gemini), forwarded as ?key=
#   GOOGLE_PLACES_API_KEY  — Google Maps Platform key, Places API enabled,
#                            restricted to Cloudflare Worker egress IPs (used by
#                            /enrich and /photo)
#   CF_AIG_TOKEN           — Cloudflare AI Gateway Authenticated Gateways bearer token
#   APIFY_TOKEN            — Apify API token, used by /fetch-post when the IG
#                            dispatch escalates to the Apify actor (carousels +
#                            og: failures). See docs/superpowers/specs/
#                            2026-05-12-apify-ig-scraping-design.md.
#   RC_REST_API_KEY        — RevenueCat REST API key (server-side, secret).
#                            Used by requireEntitlement to look up the
#                            subscriber's pro entitlement. See docs/superpowers/
#                            specs/2026-05-14-paywall-and-entitlement-gate-design.md.

# Per-content_hash extraction state for the share-time pre-warm orchestrator.
# Writes: pending → partial → done (or error). TTL via expirationTtl on each
# put; see EXTRACT_STATE_TTL_SECONDS in src/orchestrator.ts.
[[kv_namespaces]]
binding = "EXTRACT_STATE"
id = "5353ac64da7649469ac6472675dbfabd"
preview_id = "ac2ec4b46c41485c83bd70122384e01e"

# Logs include status, latency, and error class only — never OCR text.
[observability]
enabled = true
